name: Publish

on:
  release:
    types: [published]
  repository_dispatch:
    types: [publish]

permissions:
  contents: read

jobs:

  # Resolve and verify release tag
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          echo "tag=${{
            github.event.client_payload.tag || github.event.release.tag_name
          }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-tags: true
      - name: Verify tag
        run: git rev-parse --verify "refs/tags/${{ steps.tag.outputs.tag }}"

  # Build release artifacts
  build:
    needs: resolve
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.resolve.outputs.tag }}
      upload: true

  # Publish to crates.io via OIDC
  crates:
    needs: resolve
    runs-on: ubuntu-latest
    environment:
      name: crates-io
      url: https://crates.io/crates/luwen
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Login into crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish to crates.io
        run: cargo publish --workspace
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Publish wheels to PyPI via OIDC
  pypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/pyluwen
    permissions:
      id-token: write
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true
      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
